# docker-compose for local zk-drive development.
#
# Brings up Postgres (required), NATS JetStream (for the async worker
# pipeline), and ClamAV (for virus scanning). The server connects to
# each opportunistically; the worker binary requires all three.
#
# Object storage is provided by zk-object-fabric — a separate project
# at ../zk-object-fabric. Start it first:
#
#   cd ../zk-object-fabric && docker compose up -d --build
#
# That exposes the S3 API on :9000 and console API on :9001 (via the
# override file). This compose joins the "zk-fabric" network so the
# server/worker can reach the gateway at http://zk-fabric:8080.
#
# Usage (local dev without Docker for the server itself):
#   docker compose up -d postgres
#   export DATABASE_URL=postgres://zkdrive:zkdrive@localhost:5432/zk-drive?sslmode=disable
#   export JWT_SECRET=dev-secret
#   export S3_ENDPOINT=http://localhost:9000
#   export S3_BUCKET=zk-drive
#   export S3_ACCESS_KEY=demo-access-key
#   export S3_SECRET_KEY=demo-secret-key
#   go run ./cmd/server
#
# Or run the full stack via Docker (includes server + worker):
#   docker compose --profile server up -d --build

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zkdrive
      POSTGRES_PASSWORD: zkdrive
      POSTGRES_DB: zk-drive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkdrive -d zk-drive"]
      interval: 5s
      timeout: 5s
      retries: 10

  # NATS JetStream backs the async worker pipeline (preview / scan /
  # index / retention). The server connects opportunistically via
  # NATS_URL; the worker binary requires this to be running.
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ClamAV runs as an external daemon and is reached over TCP/3310
  # (INSTREAM). zk-drive statically links nothing from ClamAV so the
  # GPL-2.0 license of clamd does not affect the proprietary drive
  # build — the worker communicates through the network API only.
  clamav:
    image: clamav/clamav:1.3
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 2m

  server:
    build:
      context: .
      # Slim distroless API image (~30MB): no preview tooling.
      dockerfile: Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://zkdrive:zkdrive@postgres:5432/zk-drive?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      MIGRATIONS_DIR: /app/migrations
      LISTEN_ADDR: :8080
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: ${S3_ENDPOINT:-http://zk-fabric:8080}
      S3_BUCKET: ${S3_BUCKET:-zk-drive}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-demo-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-demo-secret-key}
      FABRIC_CONSOLE_URL: ${FABRIC_CONSOLE_URL:-http://zk-fabric:8081}
      FABRIC_CONSOLE_ADMIN_TOKEN: ${FABRIC_CONSOLE_ADMIN_TOKEN:-}
    ports:
      - "8080:8080"
    networks:
      - default
      - zk-fabric
    profiles:
      - server

  # Async worker consumes drive.* subjects. Built from the heavy
  # Dockerfile.worker image which bakes in the preview/scan tooling
  # (LibreOffice, FFmpeg, ImageMagick, ...); its ENTRYPOINT is already
  # /app/worker so no override is needed.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      clamav:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://zkdrive:zkdrive@postgres:5432/zk-drive?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      # No MIGRATIONS_DIR: the worker image (Dockerfile.worker) ships no
      # /app/migrations and never reads migration files — it only asserts a
      # minimum schema version via a DB query (RequireMinMigrationVersion).
      # Migrations are owned by the migrate Job / server --auto-migrate.
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: ${S3_ENDPOINT:-http://zk-fabric:8080}
      S3_BUCKET: ${S3_BUCKET:-zk-drive}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-demo-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-demo-secret-key}
      CLAMAV_ADDRESS: clamav:3310
    networks:
      - default
      - zk-fabric
    profiles:
      - server

volumes:
  postgres_data:

networks:
  default:
    name: zk-drive-net
  zk-fabric:
    external: true
