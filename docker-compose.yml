# docker-compose for local zk-drive development.
#
# Brings up Postgres (required) plus an optional NATS JetStream service
# for Phase 2 worker development. Uncomment the nats service block when
# you start wiring preview / scan / index workers.
#
# Usage:
#   docker compose up -d postgres
#   export DATABASE_URL=postgres://zkdrive:zkdrive@localhost:5432/zk-drive?sslmode=disable
#   export JWT_SECRET=dev-secret
#   go run ./cmd/server

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zkdrive
      POSTGRES_PASSWORD: zkdrive
      POSTGRES_DB: zk-drive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkdrive -d zk-drive"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Phase 2 async worker pipeline (preview / scan / index / retention).
  # The server connects opportunistically (NATS_URL env var); the
  # worker binary requires this to be running.
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ClamAV runs as an external daemon and is reached over TCP/3310
  # (INSTREAM). zk-drive statically links nothing from ClamAV so the
  # GPL-2.0 license of clamd does not affect the proprietary drive
  # build — the worker communicates through the network API only.
  clamav:
    image: clamav/clamav:1.3
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 2m

  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://zkdrive:zkdrive@postgres:5432/zk-drive?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      MIGRATIONS_DIR: /app/migrations
      LISTEN_ADDR: :8080
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
    ports:
      - "8080:8080"
    profiles:
      - server

  # Async worker consumes drive.* subjects. Shares the same image as
  # the server but overrides the entrypoint to run the worker binary.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      clamav:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://zkdrive:zkdrive@postgres:5432/zk-drive?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      MIGRATIONS_DIR: /app/migrations
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      CLAMAV_ADDRESS: clamav:3310
    profiles:
      - server

volumes:
  postgres_data:
