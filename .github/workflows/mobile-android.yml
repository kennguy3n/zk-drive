name: Mobile Android

# Builds the native Jetpack Compose app (mobile/android). The Gradle build
# drives the Rust bridge cross-compilation (build-android.sh via the
# buildRustBridge task), so this job sets up the full Android + Rust toolchain.
#
# Like the bridge workflow this is NOT a merge gate — it runs only when the
# app, the bridge, or the SDK crates it bridges change.
on:
  push:
    branches: [main]
    paths:
      - 'mobile/android/**'
      - 'mobile/rust-bridge/**'
      - 'sdk/**'
      - '.github/workflows/mobile-android.yml'
  pull_request:
    paths:
      - 'mobile/android/**'
      - 'mobile/rust-bridge/**'
      - 'sdk/**'
      - '.github/workflows/mobile-android.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Lint + assemble
    runs-on: ubuntu-latest
    env:
      # Surfaced as an env so step-level `if:` can gate on its presence
      # (the secrets context is not available in `if` conditions).
      ZK_ANDROID_KEYSTORE_BASE64: ${{ secrets.ZK_ANDROID_KEYSTORE_BASE64 }}
    defaults:
      run:
        working-directory: mobile/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mobile/rust-bridge

      - name: Set up Android NDK r26d
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Decode the upload keystore from a base64 secret when present so the
      # release variant is signed. Absent (e.g. on forks) the release build
      # still succeeds unsigned and we fall back to the debug APK.
      - name: Decode signing keystore
        id: signing
        if: ${{ env.ZK_ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ZK_ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
          echo "keystore=$RUNNER_TEMP/upload.jks" >> "$GITHUB_OUTPUT"

      - name: Android Lint
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Assemble debug
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Assemble release
        if: ${{ steps.signing.outputs.keystore != '' }}
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ZK_ANDROID_KEYSTORE: ${{ steps.signing.outputs.keystore }}
          ZK_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ZK_ANDROID_KEYSTORE_PASSWORD }}
          ZK_ANDROID_KEY_ALIAS: ${{ secrets.ZK_ANDROID_KEY_ALIAS }}
          ZK_ANDROID_KEY_PASSWORD: ${{ secrets.ZK_ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: zkdrive-android
          path: |
            mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
