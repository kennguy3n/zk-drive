name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Go build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      - name: Go unit tests
        run: go test -short ./...

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zkdrive
          POSTGRES_PASSWORD: zkdrive
          POSTGRES_DB: zk-drive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zkdrive -d zk-drive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://zkdrive:zkdrive@localhost:5432/zk-drive?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Run integration tests
        run: go test -count=1 ./tests/integration/...

# Note: the Playwright e2e job lives in .github/workflows/e2e.yml and
# is triggered via workflow_dispatch. It is kept out of the default
# PR-blocking CI pipeline while the storage gateway / test harness
# are still being stabilised — see deploy/README.md and
# tests/e2e/*.spec.ts for the gating env vars (E2E_RUN_UPLOAD=1).
