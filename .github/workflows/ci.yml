name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Go build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      - name: Go unit tests
        run: go test -short ./...

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zkdrive
          POSTGRES_PASSWORD: zkdrive
          POSTGRES_DB: zk-drive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zkdrive -d zk-drive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://zkdrive:zkdrive@localhost:5432/zk-drive?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Run integration tests
        run: go test -count=1 ./tests/integration/...

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    # The e2e job is informational while the storage gateway is still
    # stubbed: signup / admin / billing flows run green, but the
    # upload / sharing specs are guarded by E2E_RUN_UPLOAD. Marking
    # the job continue-on-error keeps unrelated PRs unblocked while we
    # iterate on the harness.
    continue-on-error: true
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zkdrive
          POSTGRES_PASSWORD: zkdrive
          POSTGRES_DB: zk-drive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zkdrive -d zk-drive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://zkdrive:zkdrive@localhost:5432/zk-drive?sslmode=disable
      JWT_SECRET: test-jwt-secret-32chars-xxxxxxxxxx
      LISTEN_ADDR: ":8080"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build backend
        run: go build -o /tmp/zk-drive ./cmd/server

      - name: Apply migrations
        run: |
          for f in migrations/*.up.sql; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Start backend
        run: /tmp/zk-drive &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          LISTEN_ADDR: ${{ env.LISTEN_ADDR }}

      - name: Start frontend dev server
        working-directory: frontend
        run: npx vite --port 5173 &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8080/healthz http://localhost:5173 --timeout 60000 || true

      - name: Run Playwright
        working-directory: frontend
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:5173
