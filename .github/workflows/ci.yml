name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Go lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache: true

      # poppler-utils provides pdftoppm headers for internal/preview's
      # cgo-free shell-out; the lint pass still type-checks the package
      # so we install it alongside the linter for parity with the
      # `backend` job's build environment.
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils

      # golangci-lint must be built with a Go toolchain >= the one
      # declared in go.mod (currently go 1.25.0). v2.5.0 ships built
      # with go1.25.1 and satisfies this. Pin the version explicitly
      # rather than tracking 'latest' so a future golangci-lint
      # default-rule change can't silently break CI overnight.
      #
      # NB: golangci-lint v2 requires the v7+ action (the v6 action
      # only supports v1 binaries).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m

  backend:
    name: Go build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache: true

      # poppler-utils provides pdftoppm, used by the preview service to
      # rasterise PDFs. Required by internal/preview unit tests.
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      # -race catches data races that wouldn't surface in normal
      # serialized test runs. -count=1 forces a real run rather than
      # serving a cached pass result, which matters when env-driven
      # tests change behavior between runs.
      - name: Go unit tests
        run: go test -race -count=1 -short ./...

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Use the project's `lint` script (currently `tsc -b --noEmit`)
      # rather than calling tsc directly so future changes to the lint
      # rule set live in package.json instead of CI YAML.
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  sdk:
    name: Rust desktop SDK (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      # `dtolnay/rust-toolchain` is the maintained successor to
      # `actions-rs/toolchain` (which is unmaintained). Pin to an
      # explicit Rust release so a new compiler can't silently
      # introduce lint changes that break CI overnight. Bumping
      # this version is an explicit commit.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      # rusqlite's `bundled` feature compiles SQLite from source; the
      # rest of the workspace has no C deps. We still install
      # `libssl-dev` for cargo audit smoke runs in a future PR.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the production image to verify the Dockerfile still
      # compiles cleanly against the current go.mod and source tree.
      # We don't push — this is a smoke test for the Dockerfile, not
      # a release pipeline. Push happens from the tagged-release
      # workflow (see .github/workflows/release.yml when added).
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: zk-drive:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zkdrive
          POSTGRES_PASSWORD: zkdrive
          POSTGRES_DB: zk-drive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zkdrive -d zk-drive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://zkdrive:zkdrive@localhost:5432/zk-drive?sslmode=disable
      # zk-object-fabric demo credentials. The gateway is started below
      # via docker compose so TestUploadConfirmDownloadRoundTrip exercises a
      # real presigned-URL round-trip (it skips when S3_ENDPOINT is empty).
      S3_ENDPOINT: http://localhost:8080
      S3_BUCKET: zk-drive-ci
      S3_ACCESS_KEY: demo-access-key
      S3_SECRET_KEY: demo-secret-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache: true

      - name: Check out zk-object-fabric
        uses: actions/checkout@v4
        with:
          repository: kennguy3n/zk-object-fabric
          path: zk-object-fabric

      - name: Start zk-object-fabric demo gateway
        working-directory: zk-object-fabric
        run: |
          docker compose up -d --build
          # Poll the S3 API port until the gateway accepts traffic.
          # The healthcheck inside the container is `nc -z localhost 8080`,
          # but here we wait from the runner's perspective because the
          # service-container helpers don't apply to ad-hoc compose stacks.
          for i in $(seq 1 60); do
            if curl --silent --output /dev/null --head http://localhost:8080/; then
              echo "zk-object-fabric ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Pre-create CI bucket
        env:
          AWS_ACCESS_KEY_ID: demo-access-key
          AWS_SECRET_ACCESS_KEY: demo-secret-key
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # The fabric demo accepts arbitrary bucket names via mb;
          # zk-drive presigns against a specific bucket so we create it
          # up front rather than rely on auto-create at PUT time.
          aws --endpoint-url "${S3_ENDPOINT}" s3 mb "s3://${S3_BUCKET}" || true

      - name: Run integration tests
        run: go test -count=1 ./tests/integration/...

      - name: Dump zk-object-fabric logs on failure
        if: failure()
        working-directory: zk-object-fabric
        run: docker compose logs zk-fabric || true

# Note: the Playwright e2e job lives in .github/workflows/e2e.yml and
# is triggered via workflow_dispatch. It is kept out of the default
# PR-blocking CI pipeline while the storage gateway / test harness
# are still being stabilised — see deploy/README.md and
# tests/e2e/*.spec.ts for the gating env vars (E2E_RUN_UPLOAD=1).
