name: E2E

# The Playwright suite is expensive and requires a running stack. We
# keep it on-demand via workflow_dispatch so the default PR pipeline
# stays fast and green; trigger manually from the GitHub Actions tab
# when validating a release branch.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zkdrive
          POSTGRES_PASSWORD: zkdrive
          POSTGRES_DB: zk-drive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zkdrive -d zk-drive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://zkdrive:zkdrive@localhost:5432/zk-drive?sslmode=disable
      JWT_SECRET: test-jwt-secret-32chars-xxxxxxxxxx
      LISTEN_ADDR: ":8080"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build backend
        run: go build -o /tmp/zk-drive ./cmd/server

      - name: Apply migrations
        run: |
          for f in migrations/*.up.sql; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Start backend
        run: /tmp/zk-drive &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          LISTEN_ADDR: ${{ env.LISTEN_ADDR }}

      - name: Start frontend dev server
        working-directory: frontend
        run: npx vite --port 5173 &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8080/healthz http://localhost:5173 --timeout 60000 || true

      - name: Run Playwright
        working-directory: frontend
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:5173
