name: E2E Tests

# E2E gates merge: it must pass on PRs into main and on direct pushes
# to main. Do not add `continue-on-error: true` to any step in this
# workflow — the whole point is to fail loudly on regressions.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zkdrive_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        run: go build -o bin/server ./cmd/server

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start server
        run: |
          nohup ./bin/server > server.log 2>&1 &
          echo $! > server.pid
          # Wait for /healthz so the SPA + API are ready before
          # Playwright starts navigating. If the server crashes early
          # we surface its log to make CI failures debuggable.
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz > /dev/null; then
              echo "server is up"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start within 60s" >&2
          cat server.log >&2 || true
          exit 1
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/zkdrive_test?sslmode=disable
          JWT_SECRET: test-secret
          MIGRATIONS_DIR: migrations
          LISTEN_ADDR: ":8080"
          STATIC_DIR: frontend/dist

      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
