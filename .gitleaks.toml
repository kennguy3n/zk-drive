# gitleaks configuration for zk-drive (Workstream 6.7).
#
# We extend gitleaks' built-in ruleset (AWS keys, private keys, GCP
# service accounts, Stripe keys, JWTs, etc.) rather than redefining it,
# so upstream rule improvements flow through automatically. The
# allowlist below is deliberately narrow: it names specific, audited
# test/documentation fixtures that contain non-secret placeholder
# material. It does NOT blanket-exclude `_test.go` files, so a real
# provider credential accidentally committed to a test still trips the
# high-confidence rules.
#
# Run locally with: `gitleaks detect --no-banner` (full history) or
# `gitleaks protect --staged` (pre-commit). CI runs the same binary
# (see .github/workflows/security.yml).

title = "zk-drive gitleaks config"

[extend]
# useDefault pulls in gitleaks' maintained rule pack. Keep this true so
# we inherit new detectors instead of freezing a snapshot.
useDefault = true

[allowlist]
description = "Audited non-secret test fixtures and documentation placeholders."
# Match against the secret value so the exemption is keyed to the
# fixture content, not just a path — moving the constant keeps it
# covered, and an unrelated real secret in the same file is still
# flagged because its value won't match these regexes.
regexTarget = "match"
regexes = [
  # internal/notification/repository_test.go — shared 32-char hex AES
  # test key; not a credential, only used to exercise the codec.
  '''0123456789abcdef0123456789abcdef''',
  # internal/webhooks/signer_test.go — deterministic 32-char hex HMAC
  # signing key used to assert signature stability in unit tests.
  '''abcdef0123456789abcdef0123456789''',
]
# Stopwords reduce false positives on obvious placeholder material
# (e.g. "example", "changeme") that the generic high-entropy rule would
# otherwise flag in fixtures and docs.
stopwords = [
  "example",
  "changeme",
  "placeholder",
  "dummy",
]
