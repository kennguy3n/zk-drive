version: "3.9"

# Production-oriented Compose file. Unlike the dev compose at the repo
# root, this variant:
#   - binds services to 127.0.0.1 only (behind a host-level reverse
#     proxy such as Caddy or nginx),
#   - sets health checks and resource limits,
#   - uses named volumes for durability.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: zkdrive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: zkdrive
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkdrive"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

  zk-drive-server:
    image: ghcr.io/kennguy3n/zk-drive:latest
    command: ["server"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://zkdrive:${POSTGRES_PASSWORD}@postgres:5432/zkdrive?sslmode=disable
      NATS_URL: nats://nats:4222
      LISTEN_ADDR: ":8080"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  zk-drive-worker:
    image: ghcr.io/kennguy3n/zk-drive:latest
    command: ["worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      clamav:
        condition: service_started
    environment:
      DATABASE_URL: postgres://zkdrive:${POSTGRES_PASSWORD}@postgres:5432/zkdrive?sslmode=disable
      NATS_URL: nats://nats:4222
      CLAMAV_ADDR: clamav:3310
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  pgdata:
