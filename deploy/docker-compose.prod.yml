version: "3.9"

# Production-oriented Compose file. Unlike the dev compose at the repo
# root, this variant:
#   - binds services to 127.0.0.1 only (behind a host-level reverse
#     proxy such as Caddy or nginx),
#   - sets health checks and resource limits,
#   - uses named volumes for durability.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: zkdrive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: zkdrive
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkdrive"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

  # One-shot migration runner. Brought up once per deploy ahead of
  # server / worker; exits 0 on success. The server / worker pods
  # depend on `service_completed_successfully` so Compose blocks them
  # until the schema is current — mirroring the K8s Job dependency
  # graph in deploy/k8s/migrate-job.yaml.
  zk-drive-migrate:
    image: ghcr.io/kennguy3n/zk-drive:${APP_VERSION:-0.1.0}
    entrypoint: ["/app/migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://zkdrive:${POSTGRES_PASSWORD}@postgres:5432/zkdrive?sslmode=disable
      # JWT_SECRET is read by config.Load() but not used by the
      # migrate binary; still required for the shared config schema.
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  zk-drive-server:
    image: ghcr.io/kennguy3n/zk-drive:${APP_VERSION:-0.1.0}
    entrypoint: ["/app/server"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      zk-drive-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://zkdrive:${POSTGRES_PASSWORD}@postgres:5432/zkdrive?sslmode=disable
      NATS_URL: nats://nats:4222
      LISTEN_ADDR: ":8080"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      # Browser security headers — see api/middleware/security_headers.go.
      # Defaults are safe; set these when integrating the storage gateway
      # origin (presigned URLs need it allow-listed in CSP) or during
      # rollout to test the policy in report-only mode first.
      #
      # SECURITY_HEADERS_CSP_CONNECT_EXTRA must include the public origin
      # the browser sees when contacting the fabric storage gateway —
      # otherwise direct-to-storage uploads / downloads fail with a
      # "Refused to connect" console error.
      SECURITY_HEADERS_CSP_CONNECT_EXTRA: ${SECURITY_HEADERS_CSP_CONNECT_EXTRA:-}
      SECURITY_HEADERS_CSP_IMG_EXTRA: ${SECURITY_HEADERS_CSP_IMG_EXTRA:-}
      SECURITY_HEADERS_CSP_REPORT_ONLY: ${SECURITY_HEADERS_CSP_REPORT_ONLY:-false}
      SECURITY_HEADERS_CSP_REPORT_URI: ${SECURITY_HEADERS_CSP_REPORT_URI:-}
      # SECURITY_HEADERS_DISABLE_HSTS — keep false in production so the
      # browser caches the requirement for HTTPS for a year. Flip to
      # true only for local plain-HTTP development.
      SECURITY_HEADERS_DISABLE_HSTS: ${SECURITY_HEADERS_DISABLE_HSTS:-false}
      # ONLYOFFICE collaborative office editing (see docs/CONFIGURATION.md
      # → "Collaborative office editing"). Leave ONLYOFFICE_URL unset to
      # disable the feature entirely (graceful degradation). When you run
      # the optional `onlyoffice` service below, point ONLYOFFICE_URL at it
      # (e.g. http://onlyoffice) and set ONLYOFFICE_SECRET to the same
      # value as the Document Server's JWT_SECRET. PUBLIC_URL must be the
      # externally reachable base URL so the Document Server can POST the
      # save callback back to the API.
      ONLYOFFICE_URL: ${ONLYOFFICE_URL:-}
      ONLYOFFICE_SECRET: ${ONLYOFFICE_SECRET:-}
      PUBLIC_URL: ${PUBLIC_URL:-}
    ports:
      - "127.0.0.1:8080:8080"
    # The zk-drive image ships no wget/curl (combined debian-slim and the
    # split distroless server image both omit them), so the probe runs the
    # bundled /app/healthcheck binary, which GETs /healthz over loopback.
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  zk-drive-worker:
    image: ghcr.io/kennguy3n/zk-drive:${APP_VERSION:-0.1.0}
    entrypoint: ["/app/worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      clamav:
        condition: service_started
      zk-drive-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://zkdrive:${POSTGRES_PASSWORD}@postgres:5432/zkdrive?sslmode=disable
      NATS_URL: nats://nats:4222
      CLAMAV_ADDRESS: clamav:3310
      JWT_SECRET: ${JWT_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      # Storage-counter reconciliation cadence. Docker
      # Compose has no native CronJob, so the worker's in-process
      # loop owns reconciliation here. K8s deploys typically set
      # this to 0 on the worker and schedule the dedicated
      # reconciler-cronjob.yaml instead — the two modes are
      # exclusive only to avoid duplicate row-level locking; both
      # are idempotent and converge on the same value.
      RECONCILE_INTERVAL_MINUTES: ${RECONCILE_INTERVAL_MINUTES:-60}
      # Orphan-object GC cadence. Same operational shape
      # as RECONCILE_INTERVAL_MINUTES: in-process by default under
      # Compose (no native CronJob); K8s deploys can set this to 0
      # and schedule cmd/orphan-gc externally via CronJob.
      GC_INTERVAL_MINUTES: ${GC_INTERVAL_MINUTES:-360}
      # Cooldown before a presigned-PUT row is considered an
      # orphan. Default 168 hours (7 days) matches the trash /
      # recycle-bin retention window so an orphan and an
      # undeletable trashed file age out on the same operational
      # clock. Tightening this below the presigned URL expiry
      # (15 minutes, storage.DefaultPresignExpiry) risks racing a
      # still-uploading client.
      GC_PENDING_UPLOAD_TTL_HOURS: ${GC_PENDING_UPLOAD_TTL_HOURS:-168}
      # Dedicated /metrics + /healthz HTTP surface for Prometheus
      # scrape. Bind to all interfaces inside the worker container;
      # the Compose port mapping below controls host exposure.
      # Set WORKER_METRICS_ADDR=off (or empty) to disable entirely.
      #
      # IMPORTANT: the substitution uses `-` (dash without colon),
      # NOT `:-` (colon-dash). Compose's `${VAR:-default}` form
      # substitutes the default when the variable is unset OR
      # empty — that would silently collapse the documented
      # `WORKER_METRICS_ADDR=` disable path back into the :9091
      # default. The `${VAR-default}` form only substitutes when
      # the variable is truly unset, so an explicit empty value
      # in the operator's .env passes through to the worker, and
      # the worker's own LookupEnv-based parsing then treats it
      # as "disabled". Same distinction as POSIX shell parameter
      # expansion.
      WORKER_METRICS_ADDR: ${WORKER_METRICS_ADDR-:9091}
    ports:
      # Map the worker's metrics port to the host so a Prometheus
      # running outside the Compose network can scrape. Bind to
      # 127.0.0.1 only — matches the file's stated invariant (see
      # the header comment at lines 4-6) that all listening ports
      # sit behind a host-level reverse proxy and are never
      # directly reachable from the public internet. /metrics is
      # unauthenticated and leaks Go-runtime / pool-stat
      # internals; the README's "Deploying" section spells out
      # the firewall posture in detail. Comment this out (or
      # change the bound interface to host-network if you scrape
      # via a sibling Compose service on the bridge network).
      - "127.0.0.1:9091:9091"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # Optional ONLYOFFICE Document Server for collaborative office-document
  # editing. Disabled by default — uncomment this block, then set
  # ONLYOFFICE_URL=http://onlyoffice and ONLYOFFICE_SECRET=<same as
  # JWT_SECRET below> on the zk-drive-server service above. See
  # docs/CONFIGURATION.md → "Collaborative office editing (ONLYOFFICE)".
  #
  # onlyoffice:
  #   image: onlyoffice/documentserver:latest
  #   restart: unless-stopped
  #   environment:
  #     # Require and verify signed JWTs on every editor config and save
  #     # callback. JWT_SECRET MUST equal the server's ONLYOFFICE_SECRET.
  #     JWT_ENABLED: "true"
  #     JWT_SECRET: ${ONLYOFFICE_SECRET:?set ONLYOFFICE_SECRET}
  #   # The Document Server fetches the document and posts the save
  #   # callback over the Compose network, so it must reach zk-drive-server
  #   # (PUBLIC_URL) and the storage gateway. Expose it behind the same
  #   # host-level reverse proxy as the rest of the stack.
  #   ports:
  #     - "127.0.0.1:8081:80"
  #   volumes:
  #     - onlyoffice_data:/var/www/onlyoffice/Data
  #     - onlyoffice_log:/var/log/onlyoffice
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "2.0"
  #         memory: 2G

volumes:
  pgdata:
  # Uncomment alongside the optional `onlyoffice` service above.
  # onlyoffice_data:
  # onlyoffice_log:
