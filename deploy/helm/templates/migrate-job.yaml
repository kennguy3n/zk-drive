{{- if .Values.migrate.enabled }}
# Database migration Job, run as a Helm pre-install/pre-upgrade hook so
# the schema is current before the server/worker Deployments roll. The
# before-hook-creation delete policy removes the prior Job so the same
# chart version can be re-applied (Jobs are otherwise immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: zk-drive-migrate
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
    component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrate.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        # Batch label so allow-batch-egress lets this pre-upgrade hook
        # reach Postgres (and S3) under the default-deny policy.
        app: zk-drive-batch
        component: migrate
    spec:
      restartPolicy: Never
      {{- include "zk-drive.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: migrate
          image: {{ include "zk-drive.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/migrate"]
          {{- include "zk-drive.envFrom" . | nindent 10 }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
{{- end }}
