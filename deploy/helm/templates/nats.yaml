{{- if .Values.nats.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          args: ["-js", "-m", "8222"]
          ports:
            - containerPort: 4222
            - containerPort: 8222
          readinessProbe:
            httpGet:
              port: 8222
              path: /healthz
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
{{- end }}
