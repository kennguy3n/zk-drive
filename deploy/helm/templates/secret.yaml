{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: zk-drive-secrets
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
  annotations:
    # Same pre-install/pre-upgrade hook ordering as the ConfigMap (weight
    # -10, ahead of the migrate Job at -5) so the migrate hook's envFrom
    # can resolve this Secret on a first `helm install`. Skipped entirely
    # when secrets.create=false (an existing Secret is used instead, and
    # it already exists in the cluster before the hook runs).
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
