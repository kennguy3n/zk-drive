apiVersion: v1
kind: Service
metadata:
  name: zk-drive-server
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
spec:
  selector:
    app: zk-drive-server
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.server.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-drive-server
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
spec:
  {{- if not .Values.server.hpa.enabled }}
  replicas: {{ .Values.server.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: zk-drive-server
  template:
    metadata:
      labels:
        app: zk-drive-server
        {{- include "zk-drive.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.server.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      {{- include "zk-drive.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.server.spread.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: zk-drive-server
                topologyKey: {{ .Values.server.spread.topologyKey }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: {{ .Values.server.spread.zoneKey }}
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: zk-drive-server
      {{- end }}
      containers:
        - name: server
          image: {{ include "zk-drive.serverImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/server"]
          {{- include "zk-drive.envFrom" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.server.port }}
          readinessProbe:
            httpGet:
              port: {{ .Values.server.port }}
              path: {{ .Values.server.readinessProbe.path }}
            initialDelaySeconds: {{ .Values.server.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.readinessProbe.timeoutSeconds }}
            successThreshold: 1
            failureThreshold: {{ .Values.server.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              port: {{ .Values.server.port }}
              path: {{ .Values.server.livenessProbe.path }}
            initialDelaySeconds: {{ .Values.server.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.server.livenessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
