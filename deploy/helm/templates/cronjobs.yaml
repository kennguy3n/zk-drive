{{- if .Values.cronjobs.reconciler.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: zk-drive-reconciler
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cronjobs.reconciler.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.cronjobs.reconciler.activeDeadlineSeconds }}
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          {{- include "zk-drive.imagePullSecrets" . | nindent 10 }}
          containers:
            - name: reconciler
              image: {{ include "zk-drive.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/app/reconciler"]
              {{- include "zk-drive.envFrom" . | nindent 14 }}
              resources:
                {{- toYaml .Values.cronjobs.resources | nindent 16 }}
{{- end }}
