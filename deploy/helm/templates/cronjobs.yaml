{{- if .Values.cronjobs.auditArchiver.enabled }}
---
# Requires migration 027_audit_log_archive_runs to be applied (the
# migrate Job hook handles this). AUDIT_LOG_ARCHIVE_ENABLED is the
# opt-in gate — archiver no-ops until set true.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: zk-drive-audit-archiver
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cronjobs.auditArchiver.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.cronjobs.auditArchiver.activeDeadlineSeconds }}
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          {{- include "zk-drive.imagePullSecrets" . | nindent 10 }}
          containers:
            - name: audit-archiver
              image: {{ include "zk-drive.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/app/audit-archiver"]
              env:
                - name: AUDIT_LOG_ARCHIVE_ENABLED
                  value: {{ .Values.cronjobs.auditArchiver.enabledFlag | quote }}
              {{- include "zk-drive.envFrom" . | nindent 14 }}
              resources:
                {{- toYaml .Values.cronjobs.resources | nindent 16 }}
{{- end }}
