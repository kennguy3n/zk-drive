{{- if and .Values.config.databaseUrlInSecret .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{- if not .Values.secrets.data.DATABASE_URL }}
{{- fail "config.databaseUrlInSecret=true omits DATABASE_URL from the ConfigMap, but the chart-managed Secret has no secrets.data.DATABASE_URL — so DATABASE_URL would be absent from both and every workload + the migrate Job would fail at startup. Set secrets.data.DATABASE_URL to the real connection string, or use secrets.existingSecret pointing to a Secret that carries a DATABASE_URL key." }}
{{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: zk-drive-config
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
  annotations:
    # Created as a pre-install/pre-upgrade hook with a weight (-10) lower
    # than the migrate Job (-5) so this ConfigMap exists before the
    # migrate hook's envFrom resolves it on a first `helm install`
    # (normal release resources are created only after pre-install hooks
    # complete). before-hook-creation re-creates it each run so it tracks
    # value changes and isn't left orphaned.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  {{- if not .Values.config.databaseUrlInSecret }}
  # Omitted when config.databaseUrlInSecret=true so credential-bearing
  # connection strings live only in the Secret (supplied via
  # secrets.data.DATABASE_URL or an existingSecret), not this ConfigMap.
  DATABASE_URL: {{ .Values.config.DATABASE_URL | quote }}
  {{- end }}
  NATS_URL: {{ .Values.config.NATS_URL | quote }}
  LISTEN_ADDR: {{ .Values.config.LISTEN_ADDR | quote }}
  RATE_LIMIT_PER_USER: {{ .Values.config.RATE_LIMIT_PER_USER | quote }}
  RATE_LIMIT_PER_WORKSPACE: {{ .Values.config.RATE_LIMIT_PER_WORKSPACE | quote }}
  {{- range $k, $v := .Values.config.extra }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
