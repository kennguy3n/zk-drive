apiVersion: v1
kind: ConfigMap
metadata:
  name: zk-drive-config
  namespace: {{ include "zk-drive.namespace" . }}
  labels:
    {{- include "zk-drive.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ .Values.config.DATABASE_URL | quote }}
  NATS_URL: {{ .Values.config.NATS_URL | quote }}
  LISTEN_ADDR: {{ .Values.config.LISTEN_ADDR | quote }}
  RATE_LIMIT_PER_USER: {{ .Values.config.RATE_LIMIT_PER_USER | quote }}
  RATE_LIMIT_PER_WORKSPACE: {{ .Values.config.RATE_LIMIT_PER_WORKSPACE | quote }}
  {{- range $k, $v := .Values.config.extra }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
