apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zk-drive
  namespace: zk-drive
  annotations:
    # Terminate TLS at the ingress; upstream service speaks plain
    # HTTP inside the cluster.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - zk-drive.example.com
      secretName: zk-drive-tls
  rules:
    - host: zk-drive.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zk-drive-server
                port:
                  number: 80
