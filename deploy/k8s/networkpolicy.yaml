# NetworkPolicies for the zk-drive namespace.
#
# Model: default-deny (both ingress and egress) for every pod, then a
# small set of additive allow policies that open exactly the flows the
# app needs. NetworkPolicies are additive (OR-ed), so a pod is allowed
# a connection if ANY policy permits it.
#
# Requires a CNI that enforces NetworkPolicy (Calico, Cilium, Antrea,
# AWS VPC CNI with policy, etc.). On a CNI that ignores policy (plain
# kindnet/flannel) these objects apply cleanly but are not enforced.
#
# Namespace assumptions (adjust the namespaceSelector labels to match
# your cluster):
#   - ingress controller runs in namespace `ingress-nginx`
#   - Prometheus runs in namespace `monitoring`
# Both are matched via the well-known `kubernetes.io/metadata.name`
# label that the apiserver stamps on every Namespace automatically.
---
# 1. Default deny-all ingress + egress for the whole namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: zk-drive
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# 2. Allow every pod to resolve DNS via kube-dns. Without this the
# default-deny egress rule above would break name resolution for the
# whole namespace (Postgres/NATS/S3 hostnames would never resolve).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: zk-drive
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# 3. Server ingress: from the ingress controller on 8080 (the pod
# target port behind the Service's :80) and from Prometheus scraping
# /metrics on 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-ingress
  namespace: zk-drive
spec:
  podSelector:
    matchLabels:
      app: zk-drive-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
---
# 4. Server egress: Postgres 5432, Redis 6379, NATS 4222.
# Redis is commonly a managed/external endpoint, so its rule allows the
# port to any destination; Postgres and NATS are matched to in-cluster
# pods. (DNS is covered by allow-dns-egress above.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-egress
  namespace: zk-drive
spec:
  podSelector:
    matchLabels:
      app: zk-drive-server
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: nats
      ports:
        - protocol: TCP
          port: 4222
    - ports:
        - protocol: TCP
          port: 6379
---
# 5. Worker ingress: Prometheus scraping /metrics on 9091.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-ingress
  namespace: zk-drive
spec:
  podSelector:
    matchLabels:
      app: zk-drive-worker
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9091
---
# 6. Worker egress: Postgres 5432, Redis 6379, NATS 4222, ClamAV 3310.
# As with the server, Redis is allowed by port for managed endpoints
# while Postgres/NATS/ClamAV are matched to in-cluster pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-egress
  namespace: zk-drive
spec:
  podSelector:
    matchLabels:
      app: zk-drive-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - podSelector:
            matchLabels:
              app: clamav
      ports:
        - protocol: TCP
          port: 3310
    - ports:
        - protocol: TCP
          port: 6379
