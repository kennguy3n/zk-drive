apiVersion: v1
kind: Service
metadata:
  name: clamav
  namespace: zk-drive
spec:
  selector:
    app: clamav
  ports:
    - port: 3310
      targetPort: 3310
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clamav
  namespace: zk-drive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clamav
  template:
    metadata:
      labels:
        app: clamav
    spec:
      containers:
        - name: clamav
          image: clamav/clamav:stable
          ports:
            - containerPort: 3310
          readinessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
