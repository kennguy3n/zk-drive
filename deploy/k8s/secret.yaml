apiVersion: v1
kind: Secret
metadata:
  name: zk-drive-secrets
  namespace: zk-drive
type: Opaque
stringData:
  # Replace before applying. JWT_SECRET must be >= 32 bytes. S3 and
  # SSO credentials are only needed when the matching features are
  # enabled.
  JWT_SECRET: REPLACE_ME_32B_MINIMUM_SECRET_xxxxxxx
  S3_ACCESS_KEY: REPLACE_ME
  S3_SECRET_KEY: REPLACE_ME
  S3_BUCKET: REPLACE_ME
  S3_ENDPOINT: REPLACE_ME
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""
