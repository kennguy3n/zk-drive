apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-drive-worker
  namespace: zk-drive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zk-drive-worker
  template:
    metadata:
      labels:
        app: zk-drive-worker
      # Prometheus scrape annotations target the dedicated metrics
      # port the worker brings up on :9091 (WORKER_METRICS_ADDR
      # default). The annotation form is the lowest-common-
      # denominator that Prometheus operator + plain prometheus.yml
      # service-discovery both understand.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: worker
          image: ghcr.io/kennguy3n/zk-drive:0.1.0
          command: ["/app/worker"]
          envFrom:
            - configMapRef:
                name: zk-drive-config
            - secretRef:
                name: zk-drive-secrets
          # The worker is a NATS JetStream consumer that also serves
          # a tiny /metrics + /healthz HTTP surface on :9091 so an
          # operator can scrape it via Prometheus. NATS health is
          # observed via the subscription itself; if the consumer
          # disconnects the kubelet's restart-on-exit policy recycles
          # the pod.
          #
          # IMPORTANT operator coupling: the `ports`, `readinessProbe`
          # below, and the `prometheus.io/scrape` annotation above all
          # assume the metrics server is RUNNING — i.e. WORKER_METRICS_ADDR
          # is unset (default :9091) or set to a non-empty addr. If you
          # override WORKER_METRICS_ADDR to "" or "off" in the ConfigMap
          # to disable the metrics server (the documented escape hatch
          # for sidecar-only or statsd deployments), you MUST also:
          #   1. Remove the `readinessProbe` block (otherwise the
          #      kubelet will mark the pod NotReady forever and the
          #      Deployment will never roll).
          #   2. Remove the `ports` block (otherwise other manifests
          #      that select on `metrics` will dangle).
          #   3. Either remove the `prometheus.io/scrape: "true"`
          #      annotation or accept that scrape attempts will 404.
          # The default deployment ships with metrics enabled because
          # that's the operationally correct posture; the opt-out is
          # for niche topologies and is intentionally a manifest edit
          # (not a single env-var toggle) so an operator can't
          # accidentally cripple the rollout with one ConfigMap change.
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
