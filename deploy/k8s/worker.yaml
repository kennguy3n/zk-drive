apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-drive-worker
  namespace: zk-drive
spec:
  # Baseline of 2 matches hpa-worker.yaml minReplicas, the server
  # Deployment, and the Helm chart default, so the worker stays HA
  # (PDB minAvailable: 1 + the anti-affinity/topology spread below) even
  # before the HPA attaches or if metrics-server is unavailable.
  replicas: 2
  selector:
    matchLabels:
      app: zk-drive-worker
  template:
    metadata:
      labels:
        app: zk-drive-worker
      # Prometheus scrape annotations target the dedicated metrics
      # port the worker brings up on :9091 (WORKER_METRICS_ADDR
      # default). The annotation form is the lowest-common-
      # denominator that Prometheus operator + plain prometheus.yml
      # service-discovery both understand.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      # Spread worker replicas across nodes (preferred) and AZs so a
      # single node or zone loss doesn't take out the whole consumer
      # fleet. minReplicas is 2 under hpa-worker.yaml.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: zk-drive-worker
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: zk-drive-worker
      containers:
        - name: worker
          image: ghcr.io/kennguy3n/zk-drive:0.1.0
          command: ["/app/worker"]
          envFrom:
            - configMapRef:
                name: zk-drive-config
            - secretRef:
                name: zk-drive-secrets
          # The worker is a NATS JetStream consumer that also serves
          # a tiny /metrics + /healthz HTTP surface on :9091 so an
          # operator can scrape it via Prometheus. NATS health is
          # observed via the subscription itself; if the consumer
          # disconnects the kubelet's restart-on-exit policy recycles
          # the pod.
          #
          # IMPORTANT operator coupling: the `ports`, `readinessProbe`
          # below, and the `prometheus.io/scrape` annotation above all
          # assume the metrics server is RUNNING — i.e. WORKER_METRICS_ADDR
          # is unset (default :9091) or set to a non-empty addr. If you
          # override WORKER_METRICS_ADDR to "" or "off" in the ConfigMap
          # to disable the metrics server (the documented escape hatch
          # for sidecar-only or statsd deployments), you MUST also:
          #   1. Remove the `readinessProbe` block (otherwise the
          #      kubelet will mark the pod NotReady forever and the
          #      Deployment will never roll).
          #   2. Remove the `ports` block (otherwise other manifests
          #      that select on `metrics` will dangle).
          #   3. Either remove the `prometheus.io/scrape: "true"`
          #      annotation or accept that scrape attempts will 404.
          # The default deployment ships with metrics enabled because
          # that's the operationally correct posture; the opt-out is
          # for niche topologies and is intentionally a manifest edit
          # (not a single env-var toggle) so an operator can't
          # accidentally cripple the rollout with one ConfigMap change.
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          # Liveness uses the same metrics-port /healthz surface. A
          # higher initialDelay than readiness gives the JetStream
          # consumer time to connect before the kubelet starts
          # counting liveness failures. If WORKER_METRICS_ADDR is
          # disabled (see the operator coupling note above) this
          # block must be removed alongside the readinessProbe.
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            # Requests sized at ~50%/75% of the limits — the worker
            # carries a heavier steady-state footprint (NATS consumer +
            # preview/encode work) than the server. hpa-worker.yaml
            # scales on a 70% CPU target relative to this request.
            requests:
              cpu: 500m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 512Mi
