# HorizontalPodAutoscaler for the API server. Scales on average CPU
# utilization relative to the pod's CPU *request* (250m, see
# server.yaml), so a 70% target means new replicas are added once the
# fleet sustains ~175m per pod. minReplicas keeps two pods up at all
# times so a single node drain never drops to zero capacity (paired
# with pdb-server.yaml minAvailable: 1).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zk-drive-server
  namespace: zk-drive
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zk-drive-server
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # Conservative scale-down: wait 5 minutes of sustained low load
      # before removing replicas so a brief traffic dip doesn't churn
      # pods (and their warm connection pools).
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
