apiVersion: v1
kind: Service
metadata:
  name: zk-drive-server
  namespace: zk-drive
spec:
  selector:
    app: zk-drive-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-drive-server
  namespace: zk-drive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zk-drive-server
  template:
    metadata:
      labels:
        app: zk-drive-server
    spec:
      containers:
        - name: server
          image: ghcr.io/kennguy3n/zk-drive:latest
          args: ["server"]
          envFrom:
            - configMapRef:
                name: zk-drive-config
            - secretRef:
                name: zk-drive-secrets
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              port: 8080
              path: /healthz
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              port: 8080
              path: /healthz
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
