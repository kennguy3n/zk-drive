apiVersion: v1
kind: Service
metadata:
  name: zk-drive-server
  namespace: zk-drive
spec:
  selector:
    app: zk-drive-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-drive-server
  namespace: zk-drive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zk-drive-server
  template:
    metadata:
      labels:
        app: zk-drive-server
      # Prometheus scrape annotations target the same HTTP port the
      # public traffic uses. The /metrics endpoint sits behind the
      # network policy ingress allow-list — see the README's
      # "Observability" section. If you need to split /metrics onto
      # a dedicated port (e.g. so the public ingress can drop it
      # outright), do it via an annotated SecurityHeadersOptions +
      # a second Listener; today the single-port posture mirrors
      # the WS-9 logging surface.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: server
          image: ghcr.io/kennguy3n/zk-drive:0.1.0
          command: ["/app/server"]
          envFrom:
            - configMapRef:
                name: zk-drive-config
            - secretRef:
                name: zk-drive-secrets
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              port: 8080
              path: /healthz
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              port: 8080
              path: /healthz
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
