apiVersion: v1
kind: Service
metadata:
  name: zk-drive-server
  namespace: zk-drive
spec:
  selector:
    app: zk-drive-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-drive-server
  namespace: zk-drive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zk-drive-server
  template:
    metadata:
      labels:
        app: zk-drive-server
      # Prometheus scrape annotations target the same HTTP port the
      # public traffic uses. The /metrics endpoint sits behind the
      # network policy ingress allow-list — see the README's
      # "Observability" section. If you need to split /metrics onto
      # a dedicated port (e.g. so the public ingress can drop it
      # outright), do it via an annotated SecurityHeadersOptions +
      # a second Listener; today the single-port posture mirrors
      # the structured-logging surface.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Spread replicas across nodes (preferred, not required, so a
      # single-node cluster still schedules) and across availability
      # zones for resilience to a node or AZ loss.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: zk-drive-server
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: zk-drive-server
      containers:
        - name: server
          image: ghcr.io/kennguy3n/zk-drive:0.1.0
          command: ["/app/server"]
          envFrom:
            - configMapRef:
                name: zk-drive-config
            - secretRef:
                name: zk-drive-secrets
          ports:
            - containerPort: 8080
          # Deep readiness check: /readyz pings Postgres/Redis/S3/NATS
          # (concurrently, 900ms per-check budget) so a pod that lost a
          # dependency is pulled from the Service endpoints rather than
          # serving failing traffic — see cmd/server/main.go, which
          # documents mapping /readyz to readiness. Liveness stays on the
          # shallow /healthz so a transient dependency outage doesn't
          # trigger a pod restart loop.
          readinessProbe:
            httpGet:
              port: 8080
              path: /readyz
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              port: 8080
              path: /healthz
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            # Requests sized at ~50% of the limits so the scheduler can
            # bin-pack while the HPA (hpa-server.yaml) scales on a 70%
            # CPU target relative to the request.
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
