# HorizontalPodAutoscaler for the async worker.
#
# Default: scale on average CPU utilization relative to the worker's
# CPU request (500m, see worker.yaml). A 70% target adds replicas once
# the consumer fleet sustains ~350m per pod, which on this workload
# (NATS JetStream job processing + preview/encode) tracks queue
# pressure closely enough for most deployments.
#
# Queue-depth scaling: to scale directly on the
# `zkdrive_worker_jobs_total` counter (rate of in-flight jobs) instead
# of CPU, install the Prometheus Adapter so the custom.metrics.k8s.io
# API serves a `zkdrive_worker_jobs_per_second` (or similar) Pods
# metric, then replace the Resource block below with:
#
#   - type: Pods
#     pods:
#       metric:
#         name: zkdrive_worker_jobs_per_second
#       target:
#         type: AverageValue
#         averageValue: "10"
#
# CPU is the dependency-free default so this manifest applies on any
# cluster with metrics-server; the Helm chart (deploy/helm) exposes
# both modes via values.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zk-drive-worker
  namespace: zk-drive
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zk-drive-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
